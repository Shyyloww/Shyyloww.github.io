<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Weighted Ranks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Weighted Ranks</div>
        <div class="nav-links"><a href="/logout">Logout</a></div>
    </nav>

    <main class="dashboard-grid">
        <!-- The New Body Chart -->
        <div class="grid-item body-chart-container">
            <h3>Body Chart</h3>
            <table class="body-chart-table">
                <thead>
                    <tr>
                        <th>Muscle Group</th>
                        <th>Rank</th>
                        <th>Top Exercise</th>
                        <th>Details (Weight/Reps/Sets)</th>
                        <th>Strength Score</th>
                    </tr>
                </thead>
                <tbody id="body-chart-tbody">
                    <!-- Rows will be generated by JavaScript here -->
                </tbody>
            </table>
        </div>

        <!-- The Workout Logger (remains the same) -->
        <div class="grid-item log-workout-container">
            <h3>Log a Workout</h3>
            <form id="log-workout-form">
                <label for="exercise-select">Exercise</label>
                <select id="exercise-select" required><option value="">Loading exercises...</option></select>
                <label for="weight-input">Weight (kg)</label>
                <input type="number" id="weight-input" step="0.5" placeholder="e.g., 50.5" required>
                <label for="reps-input">Reps</label>
                <input type="number" id="reps-input" placeholder="e.g., 8" required>
                <label for="sets-input">Sets</label>
                <input type="number" id="sets-input" placeholder="e.g., 3" required>
                <button type="submit">Log Workout</button>
            </form>
            <p id="log-message" class="message"></p>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
