<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Weighted Ranks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Weighted Ranks</div>
        <div class="nav-links">
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <main class="dashboard-grid">
        <div class="grid-item body-map-container">
            <h3>Body Map</h3>
            <div id="body-map-svg-container">
                <!-- SVG will be loaded here by JavaScript -->
                <p>Loading Body Map...</p>
            </div>
        </div>

        <div class="grid-item log-workout-container">
            <h3>Log a Workout</h3>
            <form id="log-workout-form">
                <label for="exercise-select">Exercise</label>
                <select id="exercise-select" required>
                    <option value="">Select an exercise...</option>
                </select>

                <label for="weight-input">Weight (kg)</label>
                <input type="number" id="weight-input" step="0.5" placeholder="e.g., 50.5" required>

                <label for="reps-input">Reps</label>
                <input type="number" id="reps-input" placeholder="e.g., 8" required>
                
                <label for="sets-input">Sets</label>
                <input type="number" id="sets-input" placeholder="e.g., 3" required>

                <button type="submit">Log Workout</button>
            </form>
            <p id="log-message" class="message"></p>
        </div>

        <div class="grid-item stats-container">
            <h3>Your Stats</h3>
            <!-- Stats will go here later -->
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
