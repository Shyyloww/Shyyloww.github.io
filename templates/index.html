<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
</head>
<body>
    <h1>Welcome to Your Fitness App!</h1>

    <h2>Connection Test: First 5 Exercises</h2>
    {% if exercises %}
        <ul>
            {% for exercise in exercises %}
                <li>{{ exercise.name }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Could not fetch exercises from the database. Check the logs.</p>
    {% endif %}
</body>
</html>
