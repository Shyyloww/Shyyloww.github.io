<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Weighted Ranks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <img src="{{ url_for('static', filename='icon.png') }}" alt="Site Icon" class="logo">
        <h1>Weighted Ranks</h1>

        <!-- Login Form (Visible by default) -->
        <div id="login-card" class="form-card">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <div class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Remember Me</label>
                </div>
                <button type="submit">Login</button>
            </form>
            <p id="login-message" class="message"></p>
            <p class="toggle-form">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        </div>

        <!-- Signup Form (Hidden by default) -->
        <div id="signup-card" class="form-card hidden">
            <h2>Create Account</h2>
            <form id="signup-form">
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p id="signup-message" class="message"></p>
            <p class="toggle-form">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
