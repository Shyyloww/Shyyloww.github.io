<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberian // Learn</title>
    <!-- Supabase Library -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- CSS STYLES --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-dark: #1e1e2e;
            --bg-card: #313244;
            --bg-sidebar: #181825;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --primary: #cba6f7; 
            --primary-hover: #b4befe;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-container {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #2c2d3c, #1e1e2e);
            position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
        }

        .auth-card { background: var(--bg-card); padding: 3rem; border-radius: 24px; width: 400px; text-align: center; }
        .auth-card h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .input-group input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: var(--bg-sidebar); border: 1px solid transparent;
            border-radius: var(--radius); color: white; outline: none;
        }
        .input-group input:focus { border-color: var(--primary); }
        .primary-btn {
            width: 100%; padding: 12px; background: var(--primary); color: var(--bg-dark);
            border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer;
        }
        .primary-btn:hover { filter: brightness(1.1); }
        .toggle-text { margin-top: 1rem; font-size: 0.9rem; cursor: pointer; }
        .toggle-text span { color: var(--primary); font-weight: 600; }
        #auth-msg { margin-top: 1rem; color: #f38ba8; min-height: 20px; font-weight: bold;}

        /* MAIN APP */
        #app-container { display: none; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-sidebar); padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; }
        .brand { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 3rem; }
        .nav-btn {
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px;
            background: transparent; border: none; color: var(--text-muted); font-size: 1rem;
            cursor: pointer; border-radius: var(--radius); margin-bottom: 0.5rem; text-align: left;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-card); color: var(--primary); }
        .content-area { flex: 1; padding: 3rem; overflow-y: auto; }
        .view { display: none; }
        .view.active-view { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: 0.2s;}
        .card:hover { border-color: var(--primary); transform: translateY(-4px); }
        
        /* SETTINGS */
        .swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: inline-block; margin-right: 10px; }
        .purple { background: #cba6f7; } .blue { background: #89b4fa; } .green { background: #a6e3a1; } .pink { background: #f5c2e7; }
        
        /* AI CHAT */
        .ai-fab { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .ai-toggle { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); border: none; font-size: 1.5rem; cursor: pointer; color: var(--bg-dark); }
        .ai-window { position: absolute; bottom: 80px; right: 0; width: 350px; height: 400px; background: var(--bg-card); border-radius: 16px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .ai-window.visible { display: flex; }
        #ai-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { padding: 10px; border-radius: 12px; font-size: 0.9rem; max-width: 80%; background: rgba(255,255,255,0.05); }
        .user-msg { background: var(--primary); color: var(--bg-dark); align-self: flex-end; }
        .ai-input-area { padding: 1rem; display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        .ai-input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-container">
        <div class="auth-card">
            <h1>Cyberian.</h1>
            <p id="auth-subtitle">Welcome back, Operator.</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>

            <button onclick="handleAuth()" id="auth-btn" class="primary-btn">Log In</button>
            
            <p class="toggle-text" onclick="toggleAuthMode()">
                New here? <span id="toggle-link">Create an account</span>
            </p>
            <div id="auth-msg"></div>
        </div>
    </div>

    <!-- MAIN APP DASHBOARD -->
    <div id="app-container">
        
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="brand">Cyberian.</div>
            <div class="menu">
                <button onclick="navTo('courses')" class="nav-btn active"><i class="ph ph-books"></i> Courses</button>
                <button onclick="navTo('fields')" class="nav-btn"><i class="ph ph-squares-four"></i> Fields</button>
                <button onclick="navTo('favorites')" class="nav-btn"><i class="ph ph-heart"></i> Favorites</button>
                <button onclick="navTo('settings')" class="nav-btn"><i class="ph ph-gear"></i> Settings</button>
            </div>
            <div class="user-profile">
                <span id="user-display">User</span>
                <button onclick="logout()" style="background:none; border:none; color:#f38ba8; cursor:pointer;"><i class="ph ph-sign-out"></i></button>
            </div>
        </nav>

        <!-- CONTENT -->
        <main class="content-area">
            <section id="view-courses" class="view active-view">
                <h2>Structured Paths</h2>
                <div id="course-grid" class="grid-layout"></div>
            </section>

            <section id="view-fields" class="view">
                <h2>Knowledge Fields</h2>
                <div id="fields-grid" class="grid-layout"></div>
            </section>

            <section id="view-favorites" class="view">
                <h2>Favorites</h2>
                <div id="favorites-grid" class="grid-layout"></div>
            </section>

            <section id="view-settings" class="view">
                <h2>Settings</h2>
                <div class="card">
                    <h3>Theme</h3>
                    <div style="margin-top:10px;">
                        <div class="swatch purple" onclick="setTheme('#cba6f7')"></div>
                        <div class="swatch blue" onclick="setTheme('#89b4fa')"></div>
                        <div class="swatch green" onclick="setTheme('#a6e3a1')"></div>
                        <div class="swatch pink" onclick="setTheme('#f5c2e7')"></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- AI -->
        <div class="ai-fab">
            <button onclick="toggleChat()" class="ai-toggle"><i class="ph ph-sparkle"></i></button>
            <div id="ai-window" class="ai-window">
                <div id="ai-messages"><div class="ai-msg">System Online.</div></div>
                <div class="ai-input-area">
                    <input type="text" id="ai-input" placeholder="Ask AI..." onkeypress="if(event.key==='Enter') sendAiMessage()">
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://exjayvebshmlzdwjbhkv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_M_mIHSDGIHaBR2s9K9FkSg_Hy1FMn85'; 
        const AI_SERVER_URL = 'https://shyyloww-github-io-1.onrender.com';

        // Renamed variable to 'sbClient' to avoid conflict with global 'supabase'
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isLoginMode = true;
        let currentUser = null;

        // --- AUTH ---
        async function handleAuth() {
            try {
                const userIn = document.getElementById('username').value.trim();
                const passIn = document.getElementById('password').value;
                const msg = document.getElementById('auth-msg');

                // 1. Client-side checks
                if(!userIn || !passIn) { 
                    msg.innerText = "Please enter both username and password."; 
                    return; 
                }
                if(passIn.length < 6) {
                    msg.innerText = "Password must be at least 6 characters.";
                    return;
                }
                
                msg.innerText = "Processing...";
                const fakeEmail = userIn + "@cyberian.io";

                if(isLoginMode) {
                    // LOGIN
                    const { data, error } = await sbClient.auth.signInWithPassword({ email: fakeEmail, password: passIn });
                    if(error) { 
                        console.error(error);
                        msg.innerText = "Error: " + error.message; 
                    } else { 
                        location.reload(); 
                    }
                } else {
                    // SIGNUP
                    const { data, error } = await sbClient.auth.signUp({
                        email: fakeEmail,
                        password: passIn,
                        options: { data: { username: userIn } }
                    });
                    if(error) { 
                        console.error(error);
                        msg.innerText = "Error: " + error.message; 
                    } else { 
                        msg.innerText = "Success! Account created. Logging you in...";
                        setTimeout(() => location.reload(), 1500); 
                    }
                }
            } catch (err) {
                document.getElementById('auth-msg').innerText = "System Crash. Check Console (F12).";
                console.error(err);
            }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById('toggle-link').innerText = isLoginMode ? "Create an account" : "Log in";
            document.getElementById('auth-msg').innerText = "";
        }

        async function logout() {
            await sbClient.auth.signOut();
            location.reload();
        }

        // --- INIT ---
        window.onload = async () => {
            const savedTheme = localStorage.getItem('cyberian-theme');
            if(savedTheme) setTheme(savedTheme);

            const { data: { session } } = await sbClient.auth.getSession();
            if(session) {
                currentUser = session.user;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                // Get username safely
                const metaUser = currentUser.user_metadata?.username;
                const emailUser = currentUser.email?.split('@')[0];
                document.getElementById('user-display').innerText = metaUser || emailUser || "Operator";
                
                loadData();
            }
        };

        // --- APP LOGIC ---
        function navTo(sec) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
            document.getElementById('view-'+sec).classList.add('active-view');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        }

        function setTheme(c) {
            document.documentElement.style.setProperty('--primary', c);
            document.documentElement.style.setProperty('--primary-hover', c);
            localStorage.setItem('cyberian-theme', c);
        }

        async function loadData() {
            // Load Courses
            const { data: courses } = await sbClient.from('courses').select('*');
            const grid = document.getElementById('course-grid');
            if(courses && courses.length > 0) {
                grid.innerHTML = "";
                courses.forEach(c => {
                    grid.innerHTML += `<div class="card"><span style="font-size:0.8rem; opacity:0.7">${c.level}</span><h3>${c.title}</h3></div>`;
                });
            } else {
                grid.innerHTML = "<p>No courses found in database.</p>";
            }
            
            // Load Fields
            const { data: cats } = await sbClient.from('categories').select('*');
            const fGrid = document.getElementById('fields-grid');
            if(cats) {
                fGrid.innerHTML = "";
                cats.forEach(c => {
                    fGrid.innerHTML += `<div class="card"><h3>${c.title}</h3></div>`;
                });
            }
        }

        // --- AI ---
        function toggleChat() {
            document.getElementById('ai-window').classList.toggle('visible');
        }

        async function sendAiMessage() {
            const inp = document.getElementById('ai-input');
            const txt = inp.value; 
            if(!txt) return;
            
            const box = document.getElementById('ai-messages');
            box.innerHTML += `<div class="ai-msg user-msg">${txt}</div>`;
            inp.value = "";
            
            try {
                const res = await fetch(`${AI_SERVER_URL}/ask-ai`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: currentUser.id, question: txt })
                });
                const d = await res.json();
                box.innerHTML += `<div class="ai-msg">${d.answer}</div>`;
            } catch(e) {
                box.innerHTML += `<div class="ai-msg">Server Offline.</div>`;
            }
        }
    </script>
</body>
</html>
